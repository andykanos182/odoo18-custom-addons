<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F5EFE3"/>

  <!-- Subtle gradient overlay -->
  <defs>
    <radialGradient id="bg-glow" cx="20%" cy="10%" r="60%">
      <stop offset="0%" stop-color="#A8B89C" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#A8B89C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg-glow-2" cx="80%" cy="90%" r="50%">
      <stop offset="0%" stop-color="#C97B5B" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#C97B5B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-glow)"/>
  <rect width="1200" height="630" fill="url(#bg-glow-2)"/>

  <!-- Top-left palm leaves -->
  <g opacity="0.5" transform="translate(-30 -30) rotate(-15)">
    <path d="M 0 0 Q 80 60 200 150 Q 100 120 0 0 Z" fill="#A8B89C"/>
    <path d="M 30 60 Q 110 100 240 200 Q 130 160 30 60 Z" fill="#8B9F7E" opacity="0.7"/>
  </g>

  <!-- Bottom-right palm leaves -->
  <g opacity="0.4" transform="translate(1230 660) rotate(165)">
    <path d="M 0 0 Q 80 60 200 150 Q 100 120 0 0 Z" fill="#A8B89C"/>
    <path d="M 30 60 Q 110 100 240 200 Q 130 160 30 60 Z" fill="#8B9F7E" opacity="0.7"/>
  </g>

  <!-- Frangipani top-right -->
  <g transform="translate(950 100)" opacity="0.7">
    <ellipse cx="0" cy="-25" rx="22" ry="35" fill="#F2D5A5"/>
    <ellipse cx="24" cy="-7" rx="22" ry="35" fill="#F2D5A5" transform="rotate(72 24 -7)"/>
    <ellipse cx="15" cy="22" rx="22" ry="35" fill="#F2D5A5" transform="rotate(144 15 22)"/>
    <ellipse cx="-15" cy="22" rx="22" ry="35" fill="#F2D5A5" transform="rotate(216 -15 22)"/>
    <ellipse cx="-24" cy="-7" rx="22" ry="35" fill="#F2D5A5" transform="rotate(288 -24 -7)"/>
    <circle cx="0" cy="0" r="9" fill="#F2D5A5"/>
    <circle cx="0" cy="0" r="5" fill="#C97B5B" opacity="0.7"/>
  </g>

  <!-- Frangipani bottom-left -->
  <g transform="translate(180 480)" opacity="0.6">
    <ellipse cx="0" cy="-20" rx="18" ry="28" fill="#F2D5A5"/>
    <ellipse cx="19" cy="-6" rx="18" ry="28" fill="#F2D5A5" transform="rotate(72 19 -6)"/>
    <ellipse cx="12" cy="18" rx="18" ry="28" fill="#F2D5A5" transform="rotate(144 12 18)"/>
    <ellipse cx="-12" cy="18" rx="18" ry="28" fill="#F2D5A5" transform="rotate(216 -12 18)"/>
    <ellipse cx="-19" cy="-6" rx="18" ry="28" fill="#F2D5A5" transform="rotate(288 -19 -6)"/>
    <circle cx="0" cy="0" r="7" fill="#C97B5B" opacity="0.7"/>
  </g>

  <!-- Main content -->
  <text x="600" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#C97B5B" font-style="italic">
    The Wedding of
  </text>

  <text x="600" y="320" text-anchor="middle" font-family="Georgia, serif" font-size="100" fill="#2C3E2D" font-style="italic" font-weight="500">
    Andyka &amp; Khusnul
  </text>

  <!-- Divider line with center dot -->
  <line x1="450" y1="380" x2="555" y2="380" stroke="#2C3E2D" stroke-width="1" opacity="0.4"/>
  <circle cx="600" cy="380" r="3" fill="#C97B5B"/>
  <line x1="645" y1="380" x2="750" y2="380" stroke="#2C3E2D" stroke-width="1" opacity="0.4"/>

  <text x="600" y="430" text-anchor="middle" font-family="Georgia, serif" font-size="36" fill="#2C3E2D" letter-spacing="8" opacity="0.7">
    14 · 06 · 2026
  </text>

  <text x="600" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#2C3E2D" letter-spacing="6" opacity="0.5" font-weight="500">
    SAVE THE DATE · BALI · INDONESIA
  </text>
</svg>
